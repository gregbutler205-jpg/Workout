<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b5cff" />
  <title>Strength & Cardio Tracker</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="Back">←</button>
      <div>
        <h1 id="screenTitle">This Week</h1>
        <div id="screenSubtitle" class="subtitle"></div>
      </div>
      <button id="menuBtn" class="icon-btn" aria-label="Menu">☰</button>
    </header>

    <main id="screen"></main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-screen="dashboard" class="nav-btn active">🏠<span>Dashboard</span></button>
      <button data-screen="history" class="nav-btn">🕘<span>History</span></button>
      <button data-screen="exercises" class="nav-btn">🏋️<span>Exercises</span></button>
      <button data-screen="progress" class="nav-btn">📈<span>Progress</span></button>
      <button data-screen="more" class="nav-btn">☰<span>More</span></button>
    </nav>
  </div>

  <dialog id="modal">
    <form method="dialog" class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle"></h2>
        <button value="cancel" class="icon-btn">✕</button>
      </div>
      <div id="modalBody"></div>
    </form>
  </dialog>

  <audio id="beep" preload="auto">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
  </audio>

  <script src="app.js"></script>
</body>
</html>
